
name: Sequential jobs workflow

on: [ workflow_dispatch ]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: build step
              run: echo "Building application"

    test:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Test step
              run: echo "Testing step"

    deploy:
        runs-on: ubuntu-latest
        needs: test
        
        steps:
            - name: Deploy step
              run: echo "Deploying application"