

name: Repo level secrets and variables workflow

on: [ workflow_dispatch ]

jobs:
    demo:
        runs-on: ubuntu-latest

        steps: 
            - name: Display repository variable
              run: echo "Company name is ${{ vars.COMPANY }}"

            - name: Use secret key
              env:
                KEY: ${{ secrets.API_KEY }}

              run: |
               echo " Secret key received "
               echo " $KEY "  # Will be masked in logs 